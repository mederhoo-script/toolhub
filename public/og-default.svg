<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#eff6ff"/>
    </linearGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#db2777"/>
    </linearGradient>
    <linearGradient id="blob1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bfdbfe;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#dbeafe;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="blob2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5d0fe;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#fae8ff;stop-opacity:0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative blobs -->
  <ellipse cx="1050" cy="120" rx="320" ry="280" fill="url(#blob1)"/>
  <ellipse cx="150" cy="530" rx="280" ry="240" fill="url(#blob2)"/>

  <!-- Card -->
  <rect x="80" y="80" width="1040" height="470" rx="28" fill="white" opacity="0.9"/>
  <rect x="80" y="80" width="1040" height="470" rx="28" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Logo -->
  <rect x="160" y="165" width="72" height="72" rx="16" fill="#2563eb"/>
  <text x="196" y="215" font-size="40" text-anchor="middle" fill="white">🖼</text>

  <!-- Badge -->
  <rect x="160" y="268" width="190" height="26" rx="13" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <circle cx="178" cy="281" r="5" fill="#3b82f6"/>
  <text x="196" y="286" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#1d4ed8" font-weight="600">20 Free Tools</text>

  <!-- Main heading -->
  <text x="160" y="350" font-family="system-ui,-apple-system,sans-serif" font-size="58" font-weight="800" fill="#0f172a">Free Online</text>
  <text x="160" y="420" font-family="system-ui,-apple-system,sans-serif" font-size="58" font-weight="800" fill="url(#grad)">Image Tools</text>

  <!-- Subtext -->
  <text x="160" y="472" font-family="system-ui,-apple-system,sans-serif" font-size="22" fill="#64748b">Convert · Compress · Resize · Transform — Instantly in your browser</text>

  <!-- Trust badges (right side) -->
  <g transform="translate(780, 200)">
    <!-- Private -->
    <rect width="220" height="54" rx="12" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
    <text x="20" y="24" font-size="20">🔒</text>
    <text x="50" y="22" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#166534">100% Private</text>
    <text x="50" y="40" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#4ade80">No file uploads ever</text>

    <!-- Free -->
    <rect y="68" width="220" height="54" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
    <text x="20" y="92" font-size="20">🆓</text>
    <text x="50" y="90" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#1e40af">Always Free</text>
    <text x="50" y="108" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#60a5fa">No sign-up required</text>

    <!-- Fast -->
    <rect y="136" width="220" height="54" rx="12" fill="#fefce8" stroke="#fde68a" stroke-width="1.5"/>
    <text x="20" y="160" font-size="20">⚡</text>
    <text x="50" y="158" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#78350f">Instant Results</text>
    <text x="50" y="176" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#f59e0b">Browser-side processing</text>

    <!-- Mobile -->
    <rect y="204" width="220" height="54" rx="12" fill="#fdf4ff" stroke="#e879f9" stroke-width="1.5" opacity="0.7"/>
    <text x="20" y="228" font-size="20">📱</text>
    <text x="50" y="226" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#701a75">Works Everywhere</text>
    <text x="50" y="244" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#d946ef">Mobile &amp; accessible</text>
  </g>

  <!-- Domain -->
  <text x="600" y="582" font-family="system-ui,-apple-system,sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">toolhub.vercel.app</text>
</svg>
